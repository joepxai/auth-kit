<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>邮箱配置后台</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 12px; padding: 40px; width: 100%; max-width: 480px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    h2 { font-size: 20px; margin-bottom: 24px; color: #111; }
    .field { margin-bottom: 14px; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 5px; }
    input, select { width: 100%; padding: 10px 13px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
    input:focus { border-color: #111; }
    .row { display: flex; gap: 8px; }
    .row .field { flex: 1; }
    .btn { padding: 11px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .2s; }
    .btn-primary { background: #111; color: #fff; width: 100%; margin-top: 8px; }
    .btn-secondary { background: #f0f0f0; color: #333; }
    .btn:hover { opacity: 0.85; }
    .msg { font-size: 13px; text-align: center; margin-top: 10px; min-height: 18px; }
    .msg.ok { color: #16a34a; }
    .msg.err { color: #dc2626; }
    .divider { border: none; border-top: 1px solid #eee; margin: 20px 0; }
    #login-panel, #config-panel { display: none; }
    #login-panel.active, #config-panel.active { display: block; }
    .test-row { display: flex; gap: 8px; margin-top: 4px; }
    .test-row input { flex: 1; }
    .preset { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .preset-btn { padding: 6px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; cursor: pointer; background: #fafafa; transition: all .2s; }
    .preset-btn:hover { background: #111; color: #fff; border-color: #111; }
  </style>
</head>
<body>
<div class="card">

  <!-- 登录 -->
  <div id="login-panel" class="active">
    <h2>管理后台</h2>
    <div class="field">
      <label>管理员密码</label>
      <input type="password" id="admin-pass" placeholder="输入密码" onkeydown="if(event.key==='Enter')doAdminLogin()" />
    </div>
    <button class="btn btn-primary" onclick="doAdminLogin()">进入</button>
    <div class="msg" id="msg-login"></div>
  </div>

  <!-- 配置 -->
  <div id="config-panel">
    <h2>SMTP 邮箱配置</h2>

    <div class="field">
      <label>快速填入常用服务商</label>
      <div class="preset">
        <div class="preset-btn" onclick="fillPreset('163')">163邮箱</div>
        <div class="preset-btn" onclick="fillPreset('qq')">QQ邮箱</div>
        <div class="preset-btn" onclick="fillPreset('gmail')">Gmail</div>
        <div class="preset-btn" onclick="fillPreset('aliyun')">阿里云</div>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>SMTP 服务器</label>
        <input type="text" id="smtp-host" placeholder="smtp.163.com" />
      </div>
      <div class="field" style="max-width:100px">
        <label>端口</label>
        <input type="number" id="smtp-port" placeholder="465" />
      </div>
    </div>

    <div class="field">
      <label>加密方式</label>
      <select id="smtp-secure">
        <option value="1">SSL（465）</option>
        <option value="0">TLS/STARTTLS（587）</option>
      </select>
    </div>

    <div class="field">
      <label>发件邮箱账号</label>
      <input type="email" id="smtp-user" placeholder="your@163.com" />
    </div>

    <div class="field">
      <label>授权码 / 密码</label>
      <input type="password" id="smtp-pass" placeholder="邮箱授权码（非登录密码）" />
    </div>

    <div class="field">
      <label>发件人名称</label>
      <input type="text" id="smtp-from" placeholder="系统通知" />
    </div>

    <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>

    <hr class="divider" />

    <div class="field">
      <label>发送测试邮件</label>
      <div class="test-row">
        <input type="email" id="test-email" placeholder="收件邮箱" />
        <button class="btn btn-secondary" onclick="sendTest()">发送测试</button>
      </div>
    </div>

    <div class="msg" id="msg-config"></div>
  </div>

</div>

<script>
const API = '/api/admin';
const presets = {
  '163':   { host: 'smtp.163.com',        port: 465, secure: '1' },
  'qq':    { host: 'smtp.qq.com',          port: 465, secure: '1' },
  'gmail': { host: 'smtp.gmail.com',       port: 587, secure: '0' },
  'aliyun':{ host: 'smtpdm.aliyun.com',   port: 465, secure: '1' },
};

function fillPreset(key) {
  const p = presets[key];
  document.getElementById('smtp-host').value = p.host;
  document.getElementById('smtp-port').value = p.port;
  document.getElementById('smtp-secure').value = p.secure;
}

function showMsg(id, msg, ok) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'msg ' + (ok ? 'ok' : 'err');
}

async function doAdminLogin() {
  const password = document.getElementById('admin-pass').value;
  const r = await fetch(`${API}/login`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ password }) }).then(r => r.json());
  if (r.ok) {
    document.getElementById('login-panel').classList.remove('active');
    document.getElementById('config-panel').classList.add('active');
    loadConfig();
  } else {
    showMsg('msg-login', r.msg || '密码错误', false);
  }
}

async function loadConfig() {
  const r = await fetch(`${API}/smtp`).then(r => r.json());
  if (r.data) {
    document.getElementById('smtp-host').value = r.data.host || '';
    document.getElementById('smtp-port').value = r.data.port || 465;
    document.getElementById('smtp-secure').value = r.data.secure ? '1' : '0';
    document.getElementById('smtp-user').value = r.data.user || '';
    document.getElementById('smtp-from').value = r.data.from_name || '';
  }
}

async function saveConfig() {
  const body = {
    host: document.getElementById('smtp-host').value,
    port: parseInt(document.getElementById('smtp-port').value) || 465,
    secure: document.getElementById('smtp-secure').value === '1',
    user: document.getElementById('smtp-user').value,
    pass: document.getElementById('smtp-pass').value,
    from_name: document.getElementById('smtp-from').value || '系统通知',
  };
  const r = await fetch(`${API}/smtp`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) }).then(r => r.json());
  showMsg('msg-config', r.msg, r.ok);
}

async function sendTest() {
  const email = document.getElementById('test-email').value;
  if (!email) return showMsg('msg-config', '请填写收件邮箱', false);
  const r = await fetch(`${API}/smtp/test`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ email }) }).then(r => r.json());
  showMsg('msg-config', r.msg, r.ok);
}
</script>
</body>
</html>
